name: Norminette

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install norminette
        run: pip install norminette

      - name: Run norminette
        id: norminette
        run: |
          set +e
          OUTPUT=$(norminette 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          JOB_STATUS: ${{ job.status }}
          NORM_OUTPUT: ${{ steps.norminette.outputs.output }}
        run: |
          TRUNCATED=$(echo "$NORM_OUTPUT" | head -c 1000)
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Norminette Passed"
          else
            COLOR=15158332
            TITLE="❌ Norminette Error"
          fi
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg url "$COMMIT_URL" \
            --arg output "$TRUNCATED" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  { name: "Repo",   value: $repo,   inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $commit, inline: false },
                  { name: "By",     value: $actor,  inline: true },
                  { name: "Result", value: $output, inline: false }
                  { name: "\u200b", value: ("[GitHubで確認](" + $url + ")"), inline: false },
                ]
              }]
            }')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
